<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency Convertor</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <form data-js-currency-converter>
        <div class="exchange-rate">
            <span class="exchange-rate__base" data-js-to-rate-base>1</span>
            <span class="exchange-rate__unit" data-js-to-rate-unit>USD</span>
            <span class="exchange-rate__base">=</span>
            <span class="exchange-rate__base" data-js-from-rate-base>1</span>
            <span class="exchange-rate__unit" data-js-from-rate-unit>USD</span>
        </div>

        <div class="convertor-currency">
            <div class="form-group">
                <input type="number" id="to-amount" name="to-amount" placeholder="0.00" min="0" step="0.01" aria-label="To Amount"/>

                <input type="text" id="from-amount" name="from-amount" placeholder="Result" readonly aria-label="From Amount"/>
            </div>
            <div class="form-group">
                <select id="to-currency" name="to-currency" aria-label="To Currency">
                    <option value="USD" selected>USD</option>
                    <option value="EUR">EUR</option>
                    <option value="RON">RON</option>
                    <option value="MDL">MDL</option>
                    <option value="GBP">GBP</option>
                    <option value="CHF">CHF</option>
                    <option value="UAH">UAH</option>
                </select>

                <select id="from-currency" name="from-currency" aria-label="From Currency">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="RON">RON</option>
                    <option value="MDL" selected>MDL</option>
                    <option value="GBP">GBP</option>
                    <option value="CHF">CHF</option>
                    <option value="UAH">UAH</option>
                </select>
            </div>
            <button type="button" data-js-btn-currency-switch>
                <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14.0001 17.9999C14.2653 17.9999 14.5196 17.8945 14.7072 17.707C14.8947 17.5195 15.0001 17.2651 15.0001 16.9999V5.4099L17.2901 7.7099C17.4784 7.8982 17.7338 8.00399 18.0001 8.00399C18.2664 8.00399 18.5218 7.8982 18.7101 7.7099C18.8984 7.52159 19.0042 7.2662 19.0042 6.9999C19.0042 6.73359 18.8984 6.4782 18.7101 6.2899L14.7101 2.2899C14.5694 2.15114 14.3909 2.05714 14.1969 2.01977C14.0029 1.98239 13.8022 2.00332 13.6201 2.0799C13.4374 2.15492 13.2811 2.28231 13.1708 2.44603C13.0604 2.60975 13.001 2.80247 13.0001 2.9999V16.9999C13.0001 17.2651 13.1054 17.5195 13.293 17.707C13.4805 17.8945 13.7348 17.9999 14.0001 17.9999ZM10.3801 21.9199C10.5627 21.8449 10.719 21.7175 10.8293 21.5538C10.9397 21.39 10.9991 21.1973 11.0001 20.9999V6.9999C11.0001 6.73468 10.8947 6.48033 10.7072 6.29279C10.5196 6.10525 10.2653 5.9999 10.0001 5.9999C9.73484 5.9999 9.48049 6.10525 9.29295 6.29279C9.10542 6.48033 9.00006 6.73468 9.00006 6.9999V18.5899L6.71006 16.2899C6.6171 16.1962 6.5065 16.1218 6.38464 16.071C6.26278 16.0202 6.13207 15.9941 6.00006 15.9941C5.86805 15.9941 5.73734 16.0202 5.61548 16.071C5.49362 16.1218 5.38302 16.1962 5.29006 16.2899C5.19633 16.3829 5.12194 16.4935 5.07117 16.6153C5.0204 16.7372 4.99426 16.8679 4.99426 16.9999C4.99426 17.1319 5.0204 17.2626 5.07117 17.3845C5.12194 17.5063 5.19633 17.6169 5.29006 17.7099L9.29006 21.7099C9.43068 21.8487 9.60926 21.9426 9.80325 21.98C9.99724 22.0174 10.1979 21.9965 10.3801 21.9199Z" fill="black"/>
                </svg>
            </button>
        </div>
    </form>
</body>
</html>
